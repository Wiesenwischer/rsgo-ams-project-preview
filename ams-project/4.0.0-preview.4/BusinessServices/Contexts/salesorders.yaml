# SalesOrders Context Fragment

metadata:
  name: SalesOrders
  description: Sales Orders bounded context services

services:
  salesorders-migrator:
    image: amssolution/salesorders.migrator:linux-v4.0.0-preview.4
    containerName: salesorders-migrator
    lifecycle: init
    environment:
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_PARAMS: ${DB_PARAMS}
      DB_ADMIN_USER: ${DB_ADMIN_USER}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
    networks:
      - ams-project-backend

  salesorders-api:
    image: amssolution/salesorders.api:linux-v4.0.0-preview.4
    containerName: salesorders-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_NAME_ERP: ${DB_NAME_ERP}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      ConnectionStrings__Cache: ${REDIS_CONNECTION}
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
      - ams-project-infra
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s

  salesorders:
    image: amssolution/salesorders:linux-v4.0.0-preview.4
    containerName: salesorders
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_NAME_ERP: ${DB_NAME_ERP}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
      - ams-project-infra
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s

  # salesorders-integration retired by PLAN-026 Phase 5 — the ERP→PM
  # trigger flow now runs through ErpIntegration.Gateway. The service is
  # intentionally absent from the manifest; the source tree will follow
  # via PLAN-027 once the legacy queue has drained.


networks:
  ams-project-backend:
    external: true
  ams-project-infra:
    external: true
