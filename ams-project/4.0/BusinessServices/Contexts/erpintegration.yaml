# ErpIntegration Context Fragment

metadata:
  name: ErpIntegration
  description: ERP Integration bounded context services

services:
  erpintegration-migrator:
    image: amssolution/erpintegration.migrator:linux-v4.0.0-preview.1
    containerName: erpintegration-migrator
    lifecycle: init
    environment:
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_PARAMS: ${DB_PARAMS}
      DB_ADMIN_USER: ${DB_ADMIN_USER}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
    networks:
      - ams-project-backend

  erpintegration-gateway:
    image: amssolution/erpintegration.gateway:linux-v4.0.0-preview.1
    containerName: erpintegration-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_NAME_ERP: ${DB_NAME_ERP}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      ServiceBusTimeToWaitBeforeTriggeringCircuitBreaker: ${SERVICE_BUS_TIME_TO_WAIT_BEFORE_TRIGGERING_CIRCUIT_BREAKER}
      ExitOnCriticalError: ${EXIT_ON_CRITICAL_ERROR}
      QUEUE_PEEKER_DELAY_MS: "1000"
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s

  planning-capacityutilization-api:
    image: amssolution/planning.capacityutilization.api:linux-v4.0.0-preview.1
    containerName: planning-capacityutilization-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_NAME_ERP: ${DB_NAME_ERP}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s

  planning-typecurve-api:
    image: amssolution/planning.typecurve.api:linux-v4.0.0-preview.1
    containerName: planning-typecurve-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_NAME_ERP: ${DB_NAME_ERP}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s

  wage-data-api:
    image: amssolution/wage.wagedata.api:linux-v4.0.0-preview.1
    containerName: wage-data-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_NAME_ERP: ${DB_NAME_ERP}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      ServiceBusTimeToWaitBeforeTriggeringCircuitBreaker: ${SERVICE_BUS_TIME_TO_WAIT_BEFORE_TRIGGERING_CIRCUIT_BREAKER}
      ExitOnCriticalError: ${EXIT_ON_CRITICAL_ERROR}
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s

  # PLAN-054 — server-side ERP plan-vs-actual sync evaluator. Subscribes to
  # ErpTaskPlanned + NewProjectScheduleAvailable from PM and to the 8 *Changed
  # events from erpintegration-gateway. Maintains TaskErpAlignment aggregates
  # (own PlanAlignment schema) and publishes TaskErpSyncStatusChanged on every
  # flip. Worker-only (no API surface) — the integration event is consumed by
  # TaskContext.Worker which projects IsErpInSync into TaskDetailsView.
  erpintegration-planalignment-worker:
    image: amssolution/erpintegration.planalignment.worker:linux-v4.0.0-preview.1
    containerName: erpintegration-planalignment-worker
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      ServiceBusTimeToWaitBeforeTriggeringCircuitBreaker: ${SERVICE_BUS_TIME_TO_WAIT_BEFORE_TRIGGERING_CIRCUIT_BREAKER}
      ExitOnCriticalError: ${EXIT_ON_CRITICAL_ERROR}
      # PlanAlignment is event-bursty (bootstrap fans out 1000+ *Changed events
      # at once on first start) — keep the peeker delay UI-responsive (100ms,
      # the EndpointConfigurationBase default) so the cold-start queue drains
      # in seconds rather than the ~17 minutes the 1000ms-default would need.
      QUEUE_PEEKER_DELAY_MS: "100"
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s

  # PLAN-053 — REST /references/expand + SignalR /signalr/labels for live
  # ERP-record labels in TaskContext-Web. Subscribes to the 9 *Changed events
  # from erpintegration-gateway and projects them into the ErpRecordLabel
  # aggregate (own ReferenceDisplay schema in DB_NAME_PERSISTENCE).
  erpintegration-referencedisplay-api:
    image: amssolution/erpintegration.referencedisplay.api:linux-v4.0.0-preview.1
    containerName: erpintegration-referencedisplay-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_SERVER: ${DB_SERVER}
      DB_NAME_PERSISTENCE: ${DB_NAME_PERSISTENCE}
      DB_NAME_TRANSPORT: ${DB_NAME_TRANSPORT}
      DB_PARAMS: ${DB_PARAMS}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      Auth__Authority: http://${AMS_PROJECT_EXTERNAL_DNS_NAME_OR_IP}:${IDENTITY_SERVER_PORT}
      Auth__Audience: api://erpintegration
      # `${VAR:-default}` fallback because RSGO does not always honour the
      # stack.yaml `default:` when an empty user-override is present. The
      # demo/0001 fallbacks match the ams.erp demo dataset; operators can
      # still set ERP_SYSTEM_ALIAS / ERP_CLIENT_ALIAS to override.
      Erp__SystemAlias: ${ERP_SYSTEM_ALIAS:-demo}
      Erp__ClientAlias: ${ERP_CLIENT_ALIAS:-0001}
      Serilog__MinimumLevel: ${LOG_LEVEL}
    networks:
      - ams-project-backend
    restart: unless-stopped
    healthCheck:
      type: http
      path: /hc
      port: 8080
      test: ["CMD", "curl", "-f", "http://localhost:8080/hc"]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s


networks:
  ams-project-backend:
    external: true
